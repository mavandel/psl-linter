name: 'Publish a new release'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-release:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
        uses: actions/checkout@v6
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
        run: npm ci
        run: npm run release
